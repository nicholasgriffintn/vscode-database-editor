name: Publish

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  marketplace:
    name: Publish to Visual Studio Marketplace
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Build VSIX
        run: pnpm run vsce:package

      - name: Publish VSIX
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: pnpm exec vsce publish --no-dependencies --allow-missing-repository --packagePath ./*.vsix --pat "$VSCE_PAT"
