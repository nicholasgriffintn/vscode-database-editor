name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate extension
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify vendored sql.js runtime
        run: pnpm run vendor:sqljs:check

      - name: Run unit tests
        run: pnpm run test:unit

      - name: Run Extension Development Host integration tests
        run: xvfb-run -a pnpm run test:integration

      - name: Verify generated fixture standards
        run: pnpm run test:fixture

      - name: Audit production dependencies
        run: pnpm run audit:prod

      - name: Reject generated differences
        run: git diff --exit-code

      - name: Build VSIX
        run: pnpm run vsce:package

      - name: Inspect VSIX archive
        run: pnpm run vsce:verify

      - name: Upload VSIX
        uses: actions/upload-artifact@v7
        with:
          name: vscode-database-editor-vsix
          path: .tmp/release/vscode-database-editor.vsix
          if-no-files-found: error
